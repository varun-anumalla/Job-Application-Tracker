<!DOCTYPE html>
<html>
<head>
    <title>Add Application</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="form-container">

    <h1>Add Application</h1>

    <form method="POST">

        <input
            type="text"
            name="company_name"
            placeholder="Company Name"
            required
        >

        <input
            type="text"
            name="job_role"
            placeholder="Job Role"
            required
        >

        <input
            type="text"
            name="location"
            placeholder="Location"
        >

        <input
            type="text"
            name="salary"
            placeholder="Salary"
        >

        <input
            type="date"
            name="applied_date"
        >

        <input
            type="text"
            name="status"
            placeholder="Status"
        >

        <textarea
            name="notes"
            placeholder="Notes"
        ></textarea>

        <button type="submit">
            Save Application
        </button>

    </form>

    <a href="/">Back</a>

</div>

</body>
</html>
